<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>jQuery Mobile Website</title>

    <!-- jQuery Mobile CSS -->
    <link rel="stylesheet"
    href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>

    <!-- jQuery Mobile JS -->
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

</head>

<body>

    <!-- Home Page -->
    <div data-role="page" id="home">

        <!-- Header -->
        <div data-role="header" data-theme="b">

            <h1>Mobile Website</h1>

        </div>

        <!-- Content -->
        <div role="main" class="ui-content">

            <h2>Welcome</h2>

            <p>This is a Mobile Website using jQuery Mobile.</p>

            <!-- Button -->
            <a href="#about"
               class="ui-btn ui-btn-b ui-corner-all">
               Go to About Page
            </a>

        </div>

        <!-- Footer -->
        <div data-role="footer" data-theme="b">

            <h4>jQuery Mobile Practical</h4>

        </div>

    </div>

    <!-- About Page -->
    <div data-role="page" id="about">

        <!-- Header -->
        <div data-role="header" data-theme="b">

            <h1>About</h1>

        </div>

        <!-- Content -->
        <div role="main" class="ui-content">

            <h2>About This Website</h2>

            <p>
                This website is created using
                jQuery Mobile Framework.
            </p>

            <!-- Back Button -->
            <a href="#home"
               class="ui-btn ui-btn-inline ui-btn-b ui-corner-all">
               Back to Home
            </a>

        </div>

        <!-- Footer -->
        <div data-role="footer" data-theme="b">

            <h4>Mobile Web App</h4>

        </div>

    </div>

</body>
</html>
